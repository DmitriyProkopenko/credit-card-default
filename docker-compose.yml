services:
  ml-service:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - backend-network

  # Фиктивный dummy nginx для концептуальной визуализации сбора логов/настройки прокси
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ml-service
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge